services:
  postgres:
    image: postgres:16-alpine
    container_name: fashion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashiondb
      POSTGRES_USER: fashion
      POSTGRES_PASSWORD: fashion123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashion -d fashiondb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
